<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works - Artist Portfolio</title>
    <style>
        body {
            background-color: #f5f5dc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            padding: 20px;
            background-color: rgba(245, 245, 220, 0.95);
            z-index: 1000;
        }
        nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-link {
            cursor: pointer;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            margin-left: auto;
        }
        .nav-link:not(:first-of-type) {
            margin-left: 20px;
        }
        .nav-link:hover {
            text-decoration: underline;
        }
        .logo-image {
            width: 60px;
            height: 60px;
            border: 2px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-right: 20px;
            margin-left: 20px;
            text-decoration: none;
        }
        .logo-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        main {
            margin-top: 100px;
            padding: 40px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        h2 {
            color: #333;
        }
        .work-item {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo-image">
                <img src="https://file.garden/aeFK7_GxABo1EsO9/logo.png" alt="">
            </a>
            <a href="works.html" class="nav-link">Works</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </nav>
    </header>
    <main>
        <h2>Works</h2>
    </main>
</body>
</html>
